<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Россильбер | Хаб проверок</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6 md:p-12">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-200">
        <div class="mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-4xl font-extrabold text-indigo-800 tracking-wider uppercase mb-1">Россильбер</h1>
            <p class="text-xl text-gray-500">Хаб проверок контрагентов</p>
        </div>

        <div class="bg-blue-50 p-5 rounded-lg border border-blue-100">
            <h2 class="text-xl font-semibold mb-2">Проверка по ИНН</h2>
            <p class="text-sm text-gray-700 mb-4">Введите ИНН компании и получите прямые ссылки для быстрой проверки в официальных источниках.</p>
            <div class="flex flex-col md:flex-row gap-3">
                <input id="innInput" type="text" maxlength="12" placeholder="Например: 7707083893" class="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <button onclick="buildLinks()" class="bg-indigo-600 text-white px-5 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Сгенерировать ссылки</button>
            </div>
            <p id="errorText" class="text-red-600 text-sm mt-3"></p>
        </div>

        <div id="resultSection" class="mt-6 hidden">
            <h3 class="text-lg font-semibold mb-3">Ссылки на проверки</h3>
            <div class="space-y-3" id="linksContainer"></div>
        </div>

        <div class="mt-8 flex flex-wrap gap-4 text-sm">
            <a href="filler.html" class="text-indigo-600 hover:text-indigo-800 font-bold">← К автозаполнению</a>
            <a href="legal.html" class="text-indigo-600 hover:text-indigo-800 font-bold">← К юридическому порталу</a>
        </div>
    </div>

    <script>
        function sanitizeInn(rawValue) {
            return rawValue.replace(/\D/g, '');
        }

        function buildLinks() {
            const input = document.getElementById('innInput');
            const errorText = document.getElementById('errorText');
            const resultSection = document.getElementById('resultSection');
            const linksContainer = document.getElementById('linksContainer');

            const inn = sanitizeInn(input.value.trim());
            input.value = inn;
            errorText.textContent = '';

            if (!(inn.length === 10 || inn.length === 12)) {
                resultSection.classList.add('hidden');
                linksContainer.innerHTML = '';
                errorText.textContent = 'Введите корректный ИНН: 10 или 12 цифр.';
                return;
            }

            const links = [
                { name: 'ЕГРЮЛ (ФНС)', url: `https://egrul.nalog.ru/index.html?query=${inn}` },
                { name: 'Картотека арбитражных дел (КАД)', url: `https://kad.arbitr.ru/SearchInstances?withProtocols=true&sides=${inn}` },
                { name: 'ФССП (Банк данных исполнительных производств)', url: `https://fssp.gov.ru/iss/ip/?is%5Binn%5D=${inn}` }
            ];

            linksContainer.innerHTML = links.map((item) => `
                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="block p-4 border border-gray-200 rounded-lg hover:border-indigo-300 hover:bg-indigo-50 transition">
                    <div class="font-semibold text-indigo-700">${item.name}</div>
                    <div class="text-xs text-gray-500 break-all mt-1">${item.url}</div>
                </a>
            `).join('');

            resultSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
