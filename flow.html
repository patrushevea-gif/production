<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rossilber Flow - Prototyping & Mindmap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .lasso-box { position: absolute; border: 2px dashed #3b82f6; background-color: rgba(59, 130, 246, 0.1); pointer-events: none; z-index: 100; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const IconDownload = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const IconUndo = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
    const IconRedo = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>;
    const IconMap = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>;

    const ShapeIconRect = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="7" width="18" height="10" rx="2"/></svg>;
    const ShapeIconOval = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="12" rx="10" ry="6"/></svg>;
    const ShapeIconSquare = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>;
    const ShapeIconCircle = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="8"/></svg>;
    const ShapeIconDiamond = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="12" y="2" width="14" height="14" transform="rotate(45 12 2)" rx="2"/></svg>;

    const NODE_COLORS = { white:"bg-white border-slate-300", blue:"bg-blue-50 border-blue-400", green:"bg-emerald-50 border-emerald-400", yellow:"bg-amber-50 border-amber-400", red:"bg-rose-50 border-rose-400", purple:"bg-fuchsia-50 border-fuchsia-400", dark:"bg-slate-800 border-slate-900", solidRed:"bg-red-600 border-red-800", solidGreen:"bg-green-600 border-green-800", solidYellow:"bg-yellow-400 border-yellow-600", solidBlack:"bg-black border-slate-900" };
    const TEXT_COLORS = { black:"text-slate-900", white:"text-white", darkRed:"text-red-900", darkGreen:"text-green-900" };
    const TEXT_COLORS_UI = { black:"bg-slate-900 text-white", white:"bg-white border-slate-300 text-slate-900", darkRed:"bg-red-900 text-white", darkGreen:"bg-green-900 text-white" };

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const deepClone = (obj) => JSON.parse(JSON.stringify(obj));
    const CANVAS_WIDTH = 3179;
    const CANVAS_HEIGHT = 4493;
    const MAX_USER_MAPS = 5;
    const LAST_SESSION_KEY = "rossilber-flow-last-session";

    function App() {
      const containerRef = useRef(null);
      const canvasRef = useRef(null);
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);
      const [history, setHistory] = useState([{ nodes: [], edges: [] }]);
      const [historyIndex, setHistoryIndex] = useState(0);
      const [selectedNodeIds, setSelectedNodeIds] = useState([]);
      const [selectedEdgeId, setSelectedEdgeId] = useState(null);
      const [editingNodeId, setEditingNodeId] = useState(null);
      const [editingEdgeId, setEditingEdgeId] = useState(null);
      const [isDraggingNode, setIsDraggingNode] = useState(false);
      const [dragStartInfo, setDragStartInfo] = useState(null);
      const [connecting, setConnecting] = useState(null);
      const [draggingWaypoint, setDraggingWaypoint] = useState(null);
      const [lasso, setLasso] = useState(null);
      const [showExportMenu, setShowExportMenu] = useState(false);
      const [showMinimap, setShowMinimap] = useState(true);
      const [scrollPos, setScrollPos] = useState({ left: 0, top: 0, w: 1000, h: 800 });
      const [currentUser, setCurrentUser] = useState('');
      const [currentMapIndex, setCurrentMapIndex] = useState(null);
      const [userNameInput, setUserNameInput] = useState('');
      const [showMapPicker, setShowMapPicker] = useState(true);

      useEffect(() => {
        if (containerRef.current) {
          containerRef.current.scrollLeft = (CANVAS_WIDTH - window.innerWidth) / 2;
          containerRef.current.scrollTop = (CANVAS_HEIGHT - window.innerHeight) / 2;
          updateScrollPos();
        }
      }, []);

      const updateScrollPos = () => {
        if (containerRef.current) {
          setScrollPos({ left: containerRef.current.scrollLeft, top: containerRef.current.scrollTop, w: containerRef.current.clientWidth, h: containerRef.current.clientHeight });
        }
      };
      const getUserStorageKey = (name) => `rossilber-flow-user-${name.trim().toLowerCase()}`;
      const readUserMaps = (name) => {
        if (!name) return Array.from({ length: MAX_USER_MAPS }, () => null);
        try {
          const raw = localStorage.getItem(getUserStorageKey(name));
          const parsed = raw ? JSON.parse(raw) : {};
          const maps = Array.isArray(parsed.maps) ? parsed.maps : [];
          return Array.from({ length: MAX_USER_MAPS }, (_, i) => maps[i] || null);
        } catch { return Array.from({ length: MAX_USER_MAPS }, () => null); }
      };
      const writeUserMaps = (name, maps) => localStorage.setItem(getUserStorageKey(name), JSON.stringify({ maps }));

      const loadMapForUser = (name, mapIndex) => {
        const maps = readUserMaps(name);
        const selected = maps[mapIndex];
        const nextNodes = selected?.nodes || [];
        const nextEdges = selected?.edges || [];
        setCurrentUser(name); setCurrentMapIndex(mapIndex); setNodes(nextNodes); setEdges(nextEdges);
        setHistory([{ nodes: deepClone(nextNodes), edges: deepClone(nextEdges) }]); setHistoryIndex(0);
        setSelectedNodeIds([]); setSelectedEdgeId(null); setEditingNodeId(null); setEditingEdgeId(null); setShowMapPicker(false);
        localStorage.setItem(LAST_SESSION_KEY, JSON.stringify({ name, mapIndex }));
      };

      const saveCurrentMap = () => {
        if (!currentUser || currentMapIndex === null) return;
        const maps = readUserMaps(currentUser);
        maps[currentMapIndex] = { nodes: deepClone(nodes), edges: deepClone(edges), updatedAt: new Date().toISOString() };
        writeUserMaps(currentUser, maps);
        alert(`Карта ${currentMapIndex + 1} сохранена для ${currentUser}`);
      };

      useEffect(() => {
        try {
          const raw = localStorage.getItem(LAST_SESSION_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed?.name) setUserNameInput(parsed.name);
        } catch {}
      }, []);

      const commitChange = (newNodes, newEdges) => {
        setNodes(newNodes); setEdges(newEdges);
        setHistory(prev => { const h = prev.slice(0, historyIndex + 1); h.push({ nodes: deepClone(newNodes), edges: deepClone(newEdges) }); if (h.length > 50) h.shift(); setHistoryIndex(h.length - 1); return h; });
      };
      const undo = () => { if (historyIndex > 0) { const i = historyIndex - 1; setHistoryIndex(i); setNodes(deepClone(history[i].nodes)); setEdges(deepClone(history[i].edges)); setSelectedNodeIds([]); setSelectedEdgeId(null);} };
      const redo = () => { if (historyIndex < history.length - 1) { const i = historyIndex + 1; setHistoryIndex(i); setNodes(deepClone(history[i].nodes)); setEdges(deepClone(history[i].edges)); setSelectedNodeIds([]); setSelectedEdgeId(null);} };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') deleteSelected();
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedNodeIds, selectedEdgeId, historyIndex, history]);

      const getCanvasCoords = useCallback((e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }, []);

      const handlePointerDownCanvas = (e) => {
        if (e.target === canvasRef.current || e.target.tagName === 'svg') {
          setSelectedNodeIds([]); setSelectedEdgeId(null); setEditingNodeId(null); setEditingEdgeId(null); setShowExportMenu(false);
          const c = getCanvasCoords(e); setLasso({ startX: c.x, startY: c.y, currX: c.x, currY: c.y });
        }
      };
      const handlePointerMove = (e) => {
        const c = getCanvasCoords(e);
        if (isDraggingNode && dragStartInfo) setNodes(dragStartInfo.nodes.map(n => selectedNodeIds.includes(n.id) ? { ...n, x: n.x + c.x - dragStartInfo.startX, y: n.y + c.y - dragStartInfo.startY } : n));
        if (lasso) setLasso(prev => ({ ...prev, currX: c.x, currY: c.y }));
        if (connecting) setConnecting(prev => ({ ...prev, currentX: c.x, currentY: c.y }));
        if (draggingWaypoint) setEdges(eds => eds.map(edge => edge.id === draggingWaypoint ? { ...edge, waypoint: { x: c.x, y: c.y } } : edge));
      };
      const handlePointerUp = () => {
        if (isDraggingNode) { setIsDraggingNode(false); commitChange(nodes, edges); }
        if (lasso) {
          const minX = Math.min(lasso.startX, lasso.currX), maxX = Math.max(lasso.startX, lasso.currX), minY = Math.min(lasso.startY, lasso.currY), maxY = Math.max(lasso.startY, lasso.currY);
          const selected = nodes.filter(n => n.x < maxX && n.x + n.width > minX && n.y < maxY && n.y + n.height > minY).map(n => n.id);
          if (selected.length > 0) setSelectedNodeIds(selected);
          setLasso(null);
        }
        if (connecting) setConnecting(null);
        if (draggingWaypoint) { setDraggingWaypoint(null); commitChange(nodes, edges); }
      };
      const handleDoubleClickCanvas = (e) => {
        if (e.target !== canvasRef.current && e.target.tagName !== 'svg') return;
        const { x, y } = getCanvasCoords(e); const w = 180, h = 80;
        const newNode = { id: generateId(), x: x - w / 2, y: y - h / 2, text: 'Новый блок', shape: 'rectangle', color: 'white', textColor: null, width: w, height: h };
        setSelectedNodeIds([newNode.id]); setSelectedEdgeId(null); setEditingNodeId(newNode.id); commitChange([...nodes, newNode], edges);
      };

      const deleteSelected = () => {
        let newNodes = nodes, newEdges = edges;
        if (selectedNodeIds.length > 0) { newNodes = nodes.filter(n => !selectedNodeIds.includes(n.id)); newEdges = edges.filter(e => !selectedNodeIds.includes(e.source) && !selectedNodeIds.includes(e.target)); }
        if (selectedEdgeId) newEdges = newEdges.filter(e => e.id !== selectedEdgeId);
        if (newNodes.length !== nodes.length || newEdges.length !== edges.length) { setSelectedNodeIds([]); setSelectedEdgeId(null); setEditingNodeId(null); setEditingEdgeId(null); commitChange(newNodes, newEdges); }
      };

      const updateSelectedNodesProperty = (property, value) => {
        if (selectedNodeIds.length === 0) return;
        const newNodes = nodes.map(n => {
          if (!selectedNodeIds.includes(n.id)) return n;
          const updated = { ...n, [property]: value };
          if (property === 'shape') {
            if (value === 'rectangle' || value === 'oval') { updated.width = 180; updated.height = 80; }
            if (value === 'square' || value === 'circle') { updated.width = 120; updated.height = 120; }
            if (value === 'diamond') { updated.width = 140; updated.height = 140; }
          }
          return updated;
        });
        commitChange(newNodes, edges);
      };
      const updateEdgeThickness = (thickness) => selectedEdgeId && commitChange(nodes, edges.map(e => e.id === selectedEdgeId ? { ...e, thickness } : e));

      const exportJSON = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ nodes, edges }));
        const link = document.createElement('a');
        const userPart = currentUser ? `-${currentUser}` : '';
        const mapPart = currentMapIndex !== null ? `-map-${currentMapIndex + 1}` : '';
        link.download = `rossilber-flow${userPart}${mapPart}.json`;
        link.href = dataStr; link.click(); setShowExportMenu(false);
      };
      const exportPNG = async () => {
        if (!canvasRef.current || nodes.length === 0) { alert('Холст пуст!'); return; }
        try {
          const pad = 80;
          const minX = Math.min(...nodes.map(n => n.x)) - pad, minY = Math.min(...nodes.map(n => n.y)) - pad;
          const maxX = Math.max(...nodes.map(n => n.x + n.width)) + pad, maxY = Math.max(...nodes.map(n => n.y + n.height)) + pad;
          const exportCanvas = await html2canvas(canvasRef.current, { x: minX, y: minY, width: maxX - minX, height: maxY - minY, backgroundColor: '#f8fafc', useCORS: true, scale: 2 });
          const link = document.createElement('a'); link.download = 'rossilber-flow.png'; link.href = exportCanvas.toDataURL('image/png'); link.click();
        } catch { alert('Ошибка экспорта'); }
        setShowExportMenu(false);
      };

      const getAnchors = (node) => ({ top: { x: node.x + node.width / 2, y: node.y, side: 'top' }, bottom: { x: node.x + node.width / 2, y: node.y + node.height, side: 'bottom' }, left: { x: node.x, y: node.y + node.height / 2, side: 'left' }, right: { x: node.x + node.width, y: node.y + node.height / 2, side: 'right' } });
      const getEdgePathAndMid = (edge, sourceNode, targetNode) => {
        const sourceAnchors = getAnchors(sourceNode), targetAnchors = getAnchors(targetNode);
        let start = edge.sourceSide ? sourceAnchors[edge.sourceSide] : sourceAnchors.right;
        let end = edge.targetSide ? targetAnchors[edge.targetSide] : targetAnchors.left;
        if (edge.waypoint) return { path: `M ${start.x} ${start.y} L ${edge.waypoint.x} ${edge.waypoint.y} L ${end.x} ${end.y}`, midX: edge.waypoint.x, midY: edge.waypoint.y };
        const offset = Math.max(50, Math.hypot(start.x - end.x, start.y - end.y) * 0.25);
        let cp1x = start.x, cp1y = start.y; if (start.side === 'right') cp1x += offset; if (start.side === 'left') cp1x -= offset; if (start.side === 'top') cp1y -= offset; if (start.side === 'bottom') cp1y += offset;
        let cp2x = end.x, cp2y = end.y; if (end.side === 'right') cp2x += offset; if (end.side === 'left') cp2x -= offset; if (end.side === 'top') cp2y -= offset; if (end.side === 'bottom') cp2y += offset;
        return { path: `M ${start.x} ${start.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${end.x} ${end.y}`, midX: 0.125 * start.x + 0.375 * cp1x + 0.375 * cp2x + 0.125 * end.x, midY: 0.125 * start.y + 0.375 * cp1y + 0.375 * cp2y + 0.125 * end.y };
      };
      const drawConnectingBezier = (p1, p2) => { const offset = Math.max(50, Math.hypot(p1.x - p2.x, p1.y - p2.y) * 0.25); let cp1x = p1.x, cp1y = p1.y; if (p1.side === 'right') cp1x += offset; if (p1.side === 'left') cp1x -= offset; if (p1.side === 'top') cp1y -= offset; if (p1.side === 'bottom') cp1y += offset; return `M ${p1.x} ${p1.y} C ${cp1x} ${cp1y}, ${p2.x} ${p2.y}, ${p2.x} ${p2.y}`; };

      return (
        <div className="flex flex-col h-screen w-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
          <header className="h-16 bg-white border-b border-slate-200 shadow-sm flex items-center justify-between px-6 shrink-0 z-50 relative">
            <div className="flex items-center space-x-3"><span className="font-bold text-xl tracking-tight text-blue-900">Rossilber Flow</span></div>
            <div className="flex items-center space-x-2">
              <button onClick={undo} disabled={historyIndex === 0} className="p-2 text-slate-600 hover:bg-slate-100 rounded-lg disabled:opacity-30 transition-all" title="Отменить (Ctrl+Z)"><IconUndo className="w-4 h-4"/></button>
              <button onClick={redo} disabled={historyIndex === history.length - 1} className="p-2 text-slate-600 hover:bg-slate-100 rounded-lg disabled:opacity-30 transition-all mr-2" title="Повторить (Ctrl+Y)"><IconRedo className="w-4 h-4"/></button>
              <div className="w-px h-6 bg-slate-200 mx-2"></div>
              <button onClick={() => setShowMinimap(!showMinimap)} className={`p-2 rounded-lg transition-all ${showMinimap ? 'bg-blue-100 text-blue-600' : 'text-slate-600 hover:bg-slate-100'}`} title="Мини-карта"><IconMap className="w-4 h-4"/></button>
              <button onClick={() => setShowMapPicker(true)} className="flex items-center px-4 py-2 ml-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 text-sm font-medium rounded-lg transition-colors">Карты</button>
              <button onClick={saveCurrentMap} disabled={!currentUser || currentMapIndex === null} className="flex items-center px-4 py-2 ml-2 bg-emerald-50 border border-emerald-200 hover:bg-emerald-100 disabled:opacity-50 disabled:cursor-not-allowed text-emerald-700 text-sm font-medium rounded-lg transition-colors">Сохранить</button>
              <button onClick={() => { setNodes([]); setEdges([]); setSelectedNodeIds([]); setSelectedEdgeId(null); commitChange([], []); }} className="flex items-center px-4 py-2 ml-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 text-sm font-medium rounded-lg transition-colors">Очистить</button>
              <div className="relative ml-2">
                <button onClick={() => setShowExportMenu(!showExportMenu)} className="flex items-center px-4 py-2 bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-700 text-sm font-medium rounded-lg transition-colors"><IconDownload className="w-4 h-4 mr-1.5" /> Скачать</button>
                {showExportMenu && <div className="absolute right-0 top-full mt-2 w-48 bg-white border border-slate-200 rounded-lg shadow-xl overflow-hidden py-1 z-50"><button onClick={exportPNG} className="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Изображение (PNG)</button><button onClick={exportJSON} className="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Файл (JSON)</button></div>}
              </div>
            </div>
          </header>

          {showMapPicker && <div className="absolute inset-0 bg-slate-900/50 z-[60] flex items-center justify-center p-4"><div className="w-full max-w-2xl bg-white rounded-2xl shadow-2xl border border-slate-200 p-6"><h2 className="text-2xl font-bold text-slate-900 mb-2">Добро пожаловать в Rossilber Flow</h2><p className="text-sm text-slate-600 mb-4">Введите имя и выберите одну из 5 персональных карт.</p><input value={userNameInput} onChange={(e) => setUserNameInput(e.target.value)} placeholder="Например: Иван" className="w-full px-4 py-2.5 border border-slate-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-200"/><div className="grid grid-cols-1 md:grid-cols-2 gap-3">{Array.from({ length: MAX_USER_MAPS }, (_, i) => { const activeName = userNameInput.trim(); const maps = activeName ? readUserMaps(activeName) : []; const mapData = maps[i]; return <button key={i} disabled={!activeName} onClick={() => loadMapForUser(activeName, i)} className="text-left p-4 border border-slate-200 rounded-xl hover:border-blue-300 hover:bg-blue-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all"><div className="font-semibold text-slate-800">Карта {i + 1}</div><div className="text-xs text-slate-500 mt-1">{mapData ? `Сохранено блоков: ${mapData.nodes?.length || 0}` : 'Пустая карта'}</div></button>; })}</div></div></div>}

          {(selectedNodeIds.length > 0 || selectedEdgeId) && <div className="absolute top-20 left-6 bg-white/95 backdrop-blur shadow-xl border border-slate-200 rounded-xl p-5 z-50 w-64 select-none"><div className="text-lg font-bold text-slate-800 mb-4 pb-3 border-b border-slate-100">{selectedEdgeId ? 'Свойства связи' : (selectedNodeIds.length > 1 ? `Выбрано: ${selectedNodeIds.length}` : 'Свойства блока')}</div>{selectedNodeIds.length > 0 && <div className="flex flex-col space-y-5"><div><div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Фигура</div><div className="flex gap-2 justify-between"><button onClick={() => updateSelectedNodesProperty('shape', 'rectangle')} className="p-2 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors bg-white"><ShapeIconRect /></button><button onClick={() => updateSelectedNodesProperty('shape', 'oval')} className="p-2 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors bg-white"><ShapeIconOval /></button><button onClick={() => updateSelectedNodesProperty('shape', 'square')} className="p-2 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors bg-white"><ShapeIconSquare /></button><button onClick={() => updateSelectedNodesProperty('shape', 'circle')} className="p-2 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors bg-white"><ShapeIconCircle /></button><button onClick={() => updateSelectedNodesProperty('shape', 'diamond')} className="p-2 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors bg-white"><ShapeIconDiamond /></button></div></div><div><div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Цвет заливки</div><div className="flex gap-2 flex-wrap">{Object.keys(NODE_COLORS).map(color => <button key={color} onClick={() => updateSelectedNodesProperty('color', color)} className={`w-8 h-8 rounded-full border shadow-sm hover:scale-110 transition-transform ${NODE_COLORS[color]}`} title={color} />)}</div></div><div><div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Цвет текста</div><div className="flex gap-2 flex-wrap">{Object.keys(TEXT_COLORS).map(color => <button key={color} onClick={() => updateSelectedNodesProperty('textColor', color)} className={`w-8 h-8 rounded-full border shadow-sm hover:scale-110 transition-transform flex items-center justify-center ${TEXT_COLORS_UI[color]}`} title={color}><span className="font-bold font-serif text-sm">A</span></button>)}</div></div></div>}{selectedEdgeId && <div className="flex flex-col space-y-5"><div><div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Толщина</div><div className="flex flex-col gap-2"><button onClick={() => updateEdgeThickness(1)} className="px-3 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-3"><div className="w-8 h-px bg-slate-600"></div> Тонкая</button><button onClick={() => updateEdgeThickness(3)} className="px-3 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-3"><div className="w-8 h-1 bg-slate-600 rounded-full"></div> Стандартная</button><button onClick={() => updateEdgeThickness(6)} className="px-3 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-3"><div className="w-8 h-2 bg-slate-600 rounded-full"></div> Жирная</button></div></div></div>}</div>}

          {showMinimap && <div className="absolute bottom-20 right-6 w-48 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden z-50"><div className="bg-slate-100 px-3 py-1.5 border-b border-slate-200 text-xs font-bold text-slate-500">Навигация</div><div className="relative w-full h-32 bg-slate-50 cursor-pointer" onPointerDown={(e) => { const rect = e.currentTarget.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; const scale = CANVAS_WIDTH / rect.width; if (containerRef.current) { containerRef.current.scrollLeft = (x * scale) - scrollPos.w / 2; containerRef.current.scrollTop = (y * scale) - scrollPos.h / 2; } }}>{nodes.map(n => <div key={n.id} className="absolute bg-slate-400 rounded-sm" style={{ left: `${(n.x / CANVAS_WIDTH) * 100}%`, top: `${(n.y / CANVAS_HEIGHT) * 100}%`, width: `${(n.width / CANVAS_WIDTH) * 100}%`, height: `${(n.height / CANVAS_HEIGHT) * 100}%` }} />)}<div className="absolute border border-blue-500 bg-blue-500/10 pointer-events-none transition-all duration-75" style={{ left: `${(scrollPos.left / CANVAS_WIDTH) * 100}%`, top: `${(scrollPos.top / CANVAS_HEIGHT) * 100}%`, width: `${(scrollPos.w / CANVAS_WIDTH) * 100}%`, height: `${(scrollPos.h / CANVAS_HEIGHT) * 100}%` }} /></div></div>}

          <div ref={containerRef} className="flex-1 overflow-auto relative bg-[#f8fafc] cursor-crosshair" onScroll={updateScrollPos}><div ref={canvasRef} style={{ width: CANVAS_WIDTH, height: CANVAS_HEIGHT, backgroundImage: 'radial-gradient(circle, #cbd5e1 1px, transparent 1px)', backgroundSize: '24px 24px' }} className="relative shadow-inner" onPointerDown={handlePointerDownCanvas} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onDoubleClick={handleDoubleClickCanvas}>{lasso && <div className="lasso-box" style={{ left: Math.min(lasso.startX, lasso.currX), top: Math.min(lasso.startY, lasso.currY), width: Math.abs(lasso.startX - lasso.currX), height: Math.abs(lasso.startY - lasso.currY) }}/>}<svg className="absolute top-0 left-0 w-full h-full pointer-events-none z-10"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b" /></marker><marker id="arrowhead-selected" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" /></marker></defs>{edges.map(edge => { const sourceNode = nodes.find(n => n.id === edge.source); const targetNode = nodes.find(n => n.id === edge.target); if (!sourceNode || !targetNode) return null; const { path } = getEdgePathAndMid(edge, sourceNode, targetNode); const isSelected = selectedEdgeId === edge.id; const strokeWidth = edge.thickness || 2; return <g key={edge.id} className="pointer-events-auto cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedEdgeId(edge.id); setSelectedNodeIds([]); setEditingNodeId(null); setEditingEdgeId(null); }}><path d={path} fill="none" stroke="transparent" strokeWidth="20" /><path d={path} fill="none" stroke={isSelected ? '#0f172a' : '#94a3b8'} strokeWidth={isSelected ? strokeWidth + 1 : strokeWidth} markerEnd={`url(#${isSelected ? 'arrowhead-selected' : 'arrowhead'})`} className="transition-all duration-200" /></g>; })}{connecting && <path d={drawConnectingBezier({ x: connecting.startX, y: connecting.startY, side: connecting.sourceSide }, { x: connecting.currentX, y: connecting.currentY })} fill="none" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="5,5" markerEnd="url(#arrowhead)" />}</svg>{edges.map(edge => { const sourceNode = nodes.find(n => n.id === edge.source); const targetNode = nodes.find(n => n.id === edge.target); if (!sourceNode || !targetNode) return null; const { midX, midY } = getEdgePathAndMid(edge, sourceNode, targetNode); const isSelected = selectedEdgeId === edge.id; const isEditing = editingEdgeId === edge.id; return <div key={`html-${edge.id}`} className="absolute z-20 pointer-events-auto flex items-center justify-center flex-col" style={{ left: midX, top: midY, transform: 'translate(-50%, -50%)' }}>{isSelected && !isEditing && <div className="w-4 h-4 bg-white border-2 border-slate-800 rounded-full mb-1 shadow-md cursor-move hover:scale-125 transition-transform" title="Потяните для создания излома. Двойной клик - удалить." onPointerDown={(e) => { e.stopPropagation(); setDraggingWaypoint(edge.id); }} onDoubleClick={(e) => { e.stopPropagation(); commitChange(nodes, edges.map(ed => ed.id === edge.id ? {...ed, waypoint: null} : ed)); }} />}{(edge.text || isSelected || isEditing) && <div onDoubleClick={(e) => { e.stopPropagation(); setEditingEdgeId(edge.id); }} className={`px-2 py-1 rounded bg-white/90 backdrop-blur-sm shadow-sm border border-slate-200 text-sm font-medium transition-colors ${isSelected ? 'border-slate-800' : ''}`}>{isEditing ? <input autoFocus value={edge.text || ''} placeholder="Текст связи..." className="bg-transparent outline-none text-center text-slate-800 min-w-[80px]" onChange={(e) => setEdges(eds => eds.map(ed => ed.id === edge.id ? {...ed, text: e.target.value} : ed))} onKeyDown={(e) => { if (e.key === 'Enter') { setEditingEdgeId(null); commitChange(nodes, edges); } }} onBlur={() => { setEditingEdgeId(null); commitChange(nodes, edges); }} onPointerDown={e => e.stopPropagation()} /> : <span className={edge.text ? 'text-slate-800' : 'text-slate-400 italic'}>{edge.text || 'Добавить текст...'}</span>}</div>}</div>; })}{nodes.map(node => { const isSelected = selectedNodeIds.includes(node.id), isEditing = editingNodeId === node.id; const shapeClass = node.shape === 'oval' ? 'rounded-[50%]' : node.shape === 'circle' ? 'rounded-full' : node.shape === 'diamond' ? 'rounded-xl rotate-45 scale-[0.80]' : 'rounded-xl'; const bgClass = NODE_COLORS[node.color || 'white']; const isDarkBg = ['dark', 'solidBlack', 'solidRed', 'solidGreen'].includes(node.color); const defaultTextColor = isDarkBg ? 'white' : 'black'; const textClass = TEXT_COLORS[node.textColor || defaultTextColor]; return <div key={node.id} style={{ position: 'absolute', left: node.x, top: node.y, width: node.width, height: node.height }} className={`group absolute z-20 ${isSelected ? 'z-30' : ''} ${!isEditing ? 'cursor-move' : ''}`} onPointerDown={(e) => { e.stopPropagation(); setEditingEdgeId(null); if (!isSelected) setSelectedNodeIds(e.shiftKey ? [...selectedNodeIds, node.id] : [node.id]); setSelectedEdgeId(null); if (!isEditing) { setIsDraggingNode(true); const coords = getCanvasCoords(e); setDragStartInfo({ startX: coords.x, startY: coords.y, nodes: nodes }); } }} onDoubleClick={(e) => { e.stopPropagation(); setEditingNodeId(node.id); }} onPointerUp={(e) => { if (connecting && connecting.sourceId !== node.id) { e.stopPropagation(); const dropCoords = getCanvasCoords(e); let bestSide = 'left', minD = Infinity; Object.values(getAnchors(node)).forEach(a => { const d = Math.hypot(a.x - dropCoords.x, a.y - dropCoords.y); if (d < minD) { minD = d; bestSide = a.side; } }); const newEdges = [...edges, { id: generateId(), source: connecting.sourceId, sourceSide: connecting.sourceSide, target: node.id, targetSide: bestSide, thickness: 2 }]; setConnecting(null); commitChange(nodes, newEdges); } }}><div className={`absolute inset-0 border-2 transition-all duration-150 shadow-sm ${bgClass} ${shapeClass} ${isSelected ? 'border-slate-800 shadow-md ring-4 ring-slate-200' : 'hover:border-slate-400'}`} />{isEditing ? <textarea autoFocus value={node.text} onChange={(e) => setNodes(nds => nds.map(n => n.id === node.id ? { ...n, text: e.target.value } : n))} onPointerDown={e => e.stopPropagation()} onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); e.target.blur(); } if (e.key === 'Escape') e.target.blur(); }} onBlur={() => { setEditingNodeId(null); commitChange(nodes, edges); }} className={`absolute inset-0 m-auto resize-none bg-transparent text-center outline-none text-sm font-medium leading-tight p-3 z-50 ${textClass}`} style={{ display: 'block', overflow: 'hidden', width: node.shape === 'diamond' ? '70%' : '100%', height: node.shape === 'diamond' ? '70%' : '100%', transform: node.shape === 'diamond' ? 'translateY(15%)' : 'none' }} /> : <div className={`absolute inset-0 flex items-center justify-center p-3 text-center text-sm font-medium leading-tight whitespace-pre-wrap pointer-events-none select-none ${textClass}`} style={{ width: node.shape === 'diamond' ? '70%' : '100%', height: node.shape === 'diamond' ? '70%' : '100%', transform: node.shape === 'diamond' ? 'translateY(15%)' : 'none', margin: 'auto' }}>{node.text}</div>}{!connecting && !isEditing && selectedNodeIds.length <= 1 && <><div className="absolute -top-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-2 border-slate-400 rounded-full opacity-0 group-hover:opacity-100 cursor-crosshair hover:border-slate-800 hover:bg-slate-100 transition-all z-40" onPointerDown={(e) => { e.stopPropagation(); const p=getCanvasCoords(e); setConnecting({ sourceId: node.id, sourceSide: 'top', startX: p.x, startY: p.y, currentX: p.x, currentY: p.y }); setSelectedNodeIds([node.id]); }} /><div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-2 border-slate-400 rounded-full opacity-0 group-hover:opacity-100 cursor-crosshair hover:border-slate-800 hover:bg-slate-100 transition-all z-40" onPointerDown={(e) => { e.stopPropagation(); const p=getCanvasCoords(e); setConnecting({ sourceId: node.id, sourceSide: 'bottom', startX: p.x, startY: p.y, currentX: p.x, currentY: p.y }); setSelectedNodeIds([node.id]); }} /><div className="absolute -left-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-white border-2 border-slate-400 rounded-full opacity-0 group-hover:opacity-100 cursor-crosshair hover:border-slate-800 hover:bg-slate-100 transition-all z-40" onPointerDown={(e) => { e.stopPropagation(); const p=getCanvasCoords(e); setConnecting({ sourceId: node.id, sourceSide: 'left', startX: p.x, startY: p.y, currentX: p.x, currentY: p.y }); setSelectedNodeIds([node.id]); }} /><div className="absolute -right-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-white border-2 border-slate-400 rounded-full opacity-0 group-hover:opacity-100 cursor-crosshair hover:border-slate-800 hover:bg-slate-100 transition-all z-40" onPointerDown={(e) => { e.stopPropagation(); const p=getCanvasCoords(e); setConnecting({ sourceId: node.id, sourceSide: 'right', startX: p.x, startY: p.y, currentX: p.x, currentY: p.y }); setSelectedNodeIds([node.id]); }} /></>}</div>; })}</div></div>
          <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-sm border border-slate-200 px-5 py-2.5 rounded-full shadow-lg text-xs font-semibold text-slate-500 flex items-center space-x-3 pointer-events-none z-50"><span>Выделение рамкой (Лассо)</span><span className="w-1.5 h-1.5 bg-slate-300 rounded-full"/><span>Двойной клик: текст (блок/стрелка)</span><span className="w-1.5 h-1.5 bg-slate-300 rounded-full"/><span>Waypoints: потяните центр выделенной линии</span></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
